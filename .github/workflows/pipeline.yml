name: Pipeline
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# One concurrent run per ref — cancel in-progress on new push.
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

# Restrict GITHUB_TOKEN to the minimum needed. Both jobs only need to read
# repo contents (checkout); SonarQube uses its own SONAR_TOKEN.
permissions:
  contents: read

jobs:
  gate:
    name: Pipeline gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for diff-based tools (Stryker --incremental etc.)

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install system tools
        run: |
          # Gitleaks (pinned version — bump deliberately)
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
          # Semgrep: pin explicitly; bump deliberately when changelog warrants.
          SEMGREP_VERSION=1.157.0
          python3 -m pip install --quiet "semgrep==${SEMGREP_VERSION}"

      - name: Prettier
        run: npx prettier --check .

      - name: ESLint
        run: npx eslint . --max-warnings=0

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Knip
        run: npx knip

      # JSDoc coverage (opt-in). Skips cleanly on repos that haven't adopted
      # the gate yet — their next install.sh run copies the script and the
      # step becomes a hard check.
      - name: JSDoc coverage
        if: ${{ hashFiles('scripts/jsdoc-coverage.ts') != '' }}
        run: npx tsx scripts/jsdoc-coverage.ts --threshold 85

      - name: Tests + coverage
        run: npm test -- --coverage

      # Stryker --incremental reads/writes reports/stryker-incremental.json.
      # Without this cache, every CI run is cold (~15-20 min on a typical repo)
      # because the file is gone between runs. Restore-keys fall back to the
      # base branch cache (with same config hash), then to any cache for the
      # OS+config, so a feature branch's first run still benefits from main's
      # most recent cache while preventing stale-config cache hits.
      #
      # Cache key includes hashFiles('stryker.conf.mjs') because Stryker
      # incremental does NOT invalidate on config changes (e.g. mutate-glob
      # carve-outs). Without the config hash a cache built when src/index.ts
      # was in the mutate set will keep reporting 270 NoCoverage mutants on
      # index.ts even after the carve-out lands. Discovered on PR #69.
      - name: Restore Stryker incremental cache
        id: stryker_cache
        if: ${{ hashFiles('stryker.conf.mjs', 'stryker.conf.js', 'stryker.config.json') != '' }}
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-${{ runner.os }}-${{ hashFiles('stryker.conf.mjs', 'stryker.conf.js', 'stryker.config.json') }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            stryker-incremental-${{ runner.os }}-${{ hashFiles('stryker.conf.mjs', 'stryker.conf.js', 'stryker.config.json') }}-${{ github.ref_name }}-
            stryker-incremental-${{ runner.os }}-${{ hashFiles('stryker.conf.mjs', 'stryker.conf.js', 'stryker.config.json') }}-main-
            stryker-incremental-${{ runner.os }}-${{ hashFiles('stryker.conf.mjs', 'stryker.conf.js', 'stryker.config.json') }}-

      # Surface cache hit/miss in CI logs — Phase 5 doctor.sh hit-rate
      # monitoring reads this signal directly from workflow output.
      - name: Stryker cache stats
        if: ${{ hashFiles('stryker.conf.mjs', 'stryker.conf.js', 'stryker.config.json') != '' }}
        run: 'echo "Stryker incremental cache hit: ${{ steps.stryker_cache.outputs.cache-hit }}"'

      - name: Stryker
        if: ${{ hashFiles('stryker.conf.mjs', 'stryker.conf.js', 'stryker.config.json') != '' }}
        run: npx stryker run --incremental

      - name: Gitleaks
        run: gitleaks detect --source . --verbose --redact --no-banner

      - name: Madge (circular deps)
        run: |
          if [ -d src ]; then
            npx madge --circular --extensions ts,tsx,js,jsx src
          else
            npx madge --circular --extensions ts,tsx,js,jsx .
          fi

      - name: Semgrep
        run: semgrep --config p/default --config p/typescript --config p/javascript --error --metrics=off --quiet .

      # Qwen step intentionally omitted — runs locally only via
      # scripts/pre-pr.sh (spec step 15). CI relies on CodeRabbit + CodeAnt
      # for the post-push AI review perspective.

  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    # Secrets can't be referenced in a job-level `if:` in GitHub Actions, so
    # the job always runs but every step is gated on an env-shim check. When
    # SONAR_TOKEN isn't configured the job no-ops cleanly (self-hosted Sonar
    # isn't reachable from GHA unless tunneled — we use Cloudflare Tunnel).
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Skip when SONAR_TOKEN is unset
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN secret not set — SonarQube gate skipped."

      - uses: actions/checkout@v4
        if: env.SONAR_TOKEN != ''
        with:
          fetch-depth: 0

      # Two-stage SonarQube gate (Issue #7). The scan-action only uploads
      # analysis; the QG verdict is computed asynchronously by the server's
      # CE task and must be polled via /api/qualitygates/project_status.
      # Without the paired quality-gate-action, a failing QG is silently
      # reported as "SonarQube pass" on every PR.
      # v6+ required: GHSA-5xq9-5g24-4g6f (argument injection in v4–v5).
      # Pinned to immutable SHA (= v6.0.0) so a re-tag of v6 can't drift.
      # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key
      - uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        if: env.SONAR_TOKEN != ''

      - uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        if: env.SONAR_TOKEN != ''
        # Leave headroom above pollingTimeoutSec so the GHA wall-clock doesn't
        # race the action's internal polling timeout (action warm-up adds time).
        timeout-minutes: 7
        with:
          # pollingTimeoutSec input requires v1.2.0+ (added in that release).
          pollingTimeoutSec: 300
